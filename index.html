<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>District Zero Prompt Studio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --gold: #d18d1f; --gold-dim: #8a5c14; --text: #e8e4dc; --text-mid: #e8e4dc; --text-dim: #e8e4dc; --text-muted: #e8e4dc; --bg: #0a0a0a; --bg-card: #0e0e0e; --bg-panel: #0c0c0c; --border: #1e1e1e; --border-mid: #2a2a2a; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', 'Courier New', monospace; min-height: 100vh; }
  a { color: inherit; }
  ::placeholder { color: #444440; opacity: 1; }

  /* Header */
  #header { border-bottom: 1px solid #1a1a1a; padding: 10px 22px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 10; gap: 16px; }
  .logo-wrap { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .logo-img { height: 32px; width: auto; display: block; }
  .logo-divider { width: 1px; height: 20px; background: #2a2a2a; }
  .logo-sub { font-size: 10px; letter-spacing: 0.22em; color: var(--gold); text-transform: uppercase; white-space: nowrap; }
  .logo-sub span { color: var(--gold); }
  .nav { display: flex; gap: 8px; }

  /* Buttons */
  .btn { background: #141414; color: var(--text); border: 1px solid #282828; padding: 7px 14px; border-radius: 4px; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; text-transform: uppercase; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
  .btn:hover { background: #1e1e1e; color: var(--text); }
  .btn-primary { background: #dedad2; color: #0a0a0a; border-color: transparent; }
  .btn-primary:hover { background: #cec9c1; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-danger { background: #200a0a; color: #bb3333; border-color: #2e1010; }
  .btn-danger:hover { background: #2e1010; }
  .btn-yt { background: #0f0f0f; color: #cc3333; border-color: #2a1010; }
  .btn-yt:hover { background: #1a0a0a; }
  .btn-nav { background: transparent; border: 1px solid transparent; color: #666660; }
  .btn-nav.active { background: #1a1a1a; border-color: var(--border-mid); color: var(--text); }
  .btn-nav:hover { color: var(--text); }
  .btn-nav.btn-add { color: var(--text); }

  /* Body */
  .body { padding: 18px 22px; }
  .body-narrow { padding: 18px 22px; max-width: 600px; }

  /* Search row */
  .search-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .search-row input { flex: 3; min-width: 0; }
  .search-row select { flex: 1; min-width: 120px; max-width: 180px; width: auto; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }

  /* Card — thumbnail only, info slides up on hover */
  .card { position: relative; border: 1px solid #1a1a1a; border-radius: 8px; overflow: hidden; transition: border-color 0.2s; cursor: pointer; }
  .card:hover { border-color: var(--gold-dim); }

  /* Thumbnail fills the card */
  .thumb { position: relative; width: 100%; padding-top: 62%; background: #080808; overflow: hidden; }
  .thumb img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: opacity 0.3s, transform 0.4s; }
  .card:hover .thumb img { opacity: 1; transform: scale(1.03); }
  .thumb-empty { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .thumb-empty-icon { font-size: 22px; opacity: 0.07; }
  .thumb-empty-label { font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; }

  /* Slide-up overlay */
  .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.97) 60%, rgba(0,0,0,0.0) 100%); padding: 28px 13px 12px; transform: translateY(calc(100% - 32px)); transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  .card:hover .card-overlay { transform: translateY(0); }

  /* Peek line — always visible at bottom */
  .card-peek { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Hidden until hover */
  .card-overlay-tags { margin-bottom: 6px; opacity: 0; transform: translateY(6px); transition: opacity 0.2s 0.1s, transform 0.2s 0.1s; }
  .card:hover .card-overlay-tags { opacity: 1; transform: translateY(0); }
  .card-overlay-snippet { font-size: 10px; color: var(--text); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 10px; opacity: 0; transform: translateY(6px); transition: opacity 0.2s 0.15s, transform 0.2s 0.15s; }
  .card:hover .card-overlay-snippet { opacity: 1; transform: translateY(0); }
  .card-overlay-actions { display: flex; gap: 6px; opacity: 0; transform: translateY(6px); transition: opacity 0.2s 0.2s, transform 0.2s 0.2s; }
  .card:hover .card-overlay-actions { opacity: 1; transform: translateY(0); }
  .card-overlay-meta { font-size: 9px; color: var(--text); margin-top: 6px; opacity: 0; transition: opacity 0.2s 0.2s; }
  .card:hover .card-overlay-meta { opacity: 1; }

  /* Tags */
  .tag { display: inline-block; font-size: 9px; letter-spacing: 0.12em; border-radius: 3px; text-transform: uppercase; margin-right: 5px; padding: 2px 7px; border: 1px solid; }
  .tag-neutral { border-color: #2a2a2a; color: var(--text); }
  .tag-sequence { border-color: #2a2a5a; color: #9a9aff; }
  .tag-author { border-color: #3a2a0a; color: var(--gold); }

  /* Sequence shots in detail */
  .shot-block { background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 6px; margin-bottom: 10px; overflow: hidden; }
  .shot-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; border-bottom: 1px solid #161616; }
  .shot-label { font-size: 9px; letter-spacing: 0.15em; color: var(--gold); text-transform: uppercase; }
  .shot-body { padding: 12px 14px; font-size: 12px; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-word; font-family: inherit; }
  .shot-copy-all { margin-top: 12px; }

  /* Shot fields in form */
  .shot-field { background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 6px; padding: 12px; margin-bottom: 8px; position: relative; }
  .shot-field-label { font-size: 9px; letter-spacing: 0.15em; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .shot-remove { background: none; border: none; color: #5a2020; font-size: 11px; cursor: pointer; font-family: inherit; letter-spacing: 0.1em; padding: 0; }
  .shot-remove:hover { color: #bb3333; }

  /* Modifier shot selector */
  .mod-shot-select { margin-bottom: 14px; }

  /* Type toggle */
  .type-toggle { display: flex; gap: 0; margin-bottom: 16px; border: 1px solid #1e1e1e; border-radius: 6px; overflow: hidden; }
  .type-toggle button { flex: 1; background: transparent; border: none; color: #666660; padding: 8px; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; font-family: inherit; text-transform: uppercase; transition: background 0.15s, color 0.15s; }
  .type-toggle button.active { background: #1e1e1e; color: var(--text); }

  /* Form */
  .form-section { margin-bottom: 16px; }
  label.lbl { font-size: 10px; letter-spacing: 0.15em; color: var(--text); text-transform: uppercase; display: block; margin-bottom: 5px; }
  input, textarea, select { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 9px 11px; color: var(--text); font-size: 12px; font-family: inherit; outline: none; }
  input:focus, textarea:focus, select:focus { border-color: var(--gold-dim); }
  textarea { resize: vertical; }
  .hint { font-size: 10px; color: var(--text); margin-top: 4px; }
  .hint-ok { color: #4aaa4a; }
  .hint-err { color: #cc4444; }
  .form-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .form-row > div { flex: 1; }
  .action-row { display: flex; gap: 10px; align-items: center; }

  /* Prompt box */
  .prompt-box { background: var(--bg-panel); border: 1px solid #181818; border-radius: 6px; padding: 13px 15px; font-size: 12px; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-word; font-family: inherit; }
  .prompt-box-adapted { border-color: #182018; }
  .prompt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }

  /* Detail preview */
  .detail-preview { position: relative; width: 100%; padding-top: 56.25%; background: #080808; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
  .detail-preview img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
  .detail-preview-yt { position: absolute; bottom: 10px; right: 10px; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.78); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 6px 14px; text-decoration: none; color: rgba(255,255,255,0.7); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }

  /* Divider */
  .divider { border-top: 1px solid #181818; margin: 18px 0; }

  /* Modifier panel */
  .modifier { background: var(--bg-panel); border: 1px solid #181818; border-radius: 8px; padding: 16px; }
  .modifier-title { font-size: 10px; letter-spacing: 0.18em; color: var(--gold); text-transform: uppercase; margin-bottom: 14px; }
  .chip-row { margin-bottom: 10px; }
  .chip-row-label { font-size: 9px; color: var(--text); letter-spacing: 0.1em; margin-bottom: 5px; }
  .chip { display: inline-block; font-size: 9px; letter-spacing: 0.1em; padding: 2px 7px; border-radius: 3px; margin-right: 4px; margin-bottom: 4px; border: 1px solid; }
  .chip-locked { border-color: #3e1a1a; color: #cc6060; }
  .chip-swap { border-color: #1a3e1a; color: #60cc60; }

  /* Settings panel */
  .settings-panel { background: var(--bg-panel); border: 1px solid #181818; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .settings-title { font-size: 10px; letter-spacing: 0.18em; color: var(--gold); text-transform: uppercase; margin-bottom: 14px; }
  .api-key-row { display: flex; gap: 8px; }
  .api-key-row input { flex: 1; font-family: monospace; letter-spacing: 0.05em; }
  .api-status { font-size: 10px; margin-top: 6px; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 0; }
  .empty-icon { font-size: 26px; opacity: 0.3; margin-bottom: 10px; color: var(--gold); }
  .empty-label { font-size: 11px; letter-spacing: 0.15em; color: var(--text); }
  .empty-sub { font-size: 10px; color: #666660; margin-top: 6px; }

  /* Count */
  .count { font-size: 10px; color: var(--text); margin-bottom: 12px; letter-spacing: 0.1em; }

  /* GIF preview in form */
  .gif-preview { width: 100%; border-radius: 6px; margin-top: 8px; border: 1px solid #1a1a1a; display: block; }

  /* Detail meta */
  .detail-meta { margin-bottom: 12px; }
  .detail-date { font-size: 10px; color: var(--text); }

  /* Sections in detail */
  .detail-section { margin-bottom: 16px; }

  /* Views */
  .view { display: none; }
  .view.active { display: block; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #333; border-top-color: #aaa; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }

  /* Modal */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: #0e0e0e; border: 1px solid #2a2a2a; border-radius: 10px; padding: 28px; max-width: 480px; width: 100%; }
  .modal-icon { font-size: 22px; margin-bottom: 14px; opacity: 0.5; }
  .modal-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 10px; letter-spacing: 0.05em; }
  .modal-body { font-size: 11px; color: var(--text); line-height: 1.8; margin-bottom: 20px; }
  .modal-body a { color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold-dim); }
  .modal-body strong { color: var(--text); font-weight: 500; }
  .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag-author { border-color: #3a2a0a; color: var(--gold); }

  /* Tools */
  .file-badge { display: inline-block; font-size: 9px; letter-spacing: 0.1em; padding: 2px 7px; border-radius: 3px; margin-right: 4px; border: 1px solid #1a3a1a; color: #5aaa5a; text-transform: uppercase; }
  .file-block { background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
  .file-block-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; border-bottom: 1px solid #161616; }
  .file-block-name { font-size: 11px; color: var(--gold); letter-spacing: 0.08em; font-family: monospace; }
  .file-block-body { padding: 10px 14px; font-size: 11px; color: var(--text); white-space: pre-wrap; word-break: break-word; font-family: monospace; line-height: 1.6; max-height: 180px; overflow-y: auto; }
  .tag-tool-card { border-color: #1a3a1a; color: #5aaa5a; }
  .file-field { background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
  .file-field-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 9px; letter-spacing: 0.12em; color: var(--gold); text-transform: uppercase; }
  .how-to-box { background: var(--bg-panel); border: 1px solid #181818; border-radius: 6px; padding: 13px 15px; font-size: 12px; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-word; font-family: inherit; }
</head>
<body>

<div id="header">
  <div class="logo-wrap">
    <a href="https://thedistrictzero.com/" target="_blank" rel="noopener noreferrer"><img class="logo-img" src="https://cdn.jsdelivr.net/gh/Gerry-Malta/Prompt_Studio@main/DZ_logo_color_transparent_s.png" alt="District Zero"></a>
    <div class="logo-divider"></div>
    <span class="logo-sub">Prompt <span>Studio</span></span>
  </div>
  <div class="nav" id="nav-btns"></div>
</div>

<div id="view-library" class="view active">
  <div id="sync-banner" style="display:none;background:#0f1a0f;border-bottom:1px solid #1a2a1a;padding:8px 22px;font-size:10px;color:#3a7a3a;letter-spacing:0.1em;"></div>
  <div class="body">
    <div class="search-row">
      <input type="text" id="search-input" placeholder="Search..." oninput="filterPresets()">
      <select id="tool-filter" onchange="filterPresets()">
        <option value="All">All tools</option>
        <option>Seedance</option><option>Kling</option><option>ComfyUI</option><option>Other</option>
      </select>
    </div>
    <div id="preset-count" class="count"></div>
    <div id="preset-grid" class="grid"></div>
    <div id="empty-state" class="empty" style="display:none">
      <div class="empty-icon">◎</div>
      <div class="empty-label" id="empty-label">NO PRESETS YET</div>
      <div class="empty-sub" id="empty-sub">Hit + Add to save your first prompt</div>
    </div>
  </div>
</div>

<div id="view-add" class="view">
  <div class="body-narrow">
    <div class="form-section">
      <label class="lbl">Title</label>
      <input type="text" id="add-title" placeholder="e.g. Freefall through Valletta">
    </div>
    <div class="form-row">
      <div>
        <label class="lbl">Tool</label>
        <select id="add-tool">
          <option>Seedance</option><option>Kling</option><option>ComfyUI</option><option>Other</option>
        </select>
      </div>
      <div>
        <label class="lbl">Shot type</label>
        <select id="add-shot">
          <option>Wide</option><option>Close-up</option><option>POV</option>
          <option>Aerial</option><option>Tracking</option><option>Static</option>
          <option>Handheld</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-section">
      <label class="lbl">Preview GIF filename</label>
      <input type="text" id="add-gif" placeholder="e.g. valletta-freefall.gif" oninput="previewGif('add')">
      <div id="add-gif-hint" class="hint"></div>
      <img id="add-gif-preview" class="gif-preview" style="display:none" alt="GIF preview">
    </div>
    <div class="form-section">
      <label class="lbl">YouTube URL <span style="color:#282828">(optional)</span></label>
      <input type="text" id="add-yt" placeholder="https://youtu.be/..." oninput="validateYt('add')">
      <div id="add-yt-hint" class="hint"></div>
    </div>
    <div class="form-section">
      <label class="lbl">Card type</label>
      <div class="type-toggle">
        <button id="add-type-single" class="active" onclick="setAddType('single')">Single Shot</button>
        <button id="add-type-sequence" onclick="setAddType('sequence')">Sequence</button>
      </div>
    </div>
    <div class="form-section">
      <label class="lbl" id="add-prompt-label">Prompt</label>
      <div id="add-shots-container">
        <div class="shot-field" id="add-shot-field-0">
          <div class="shot-field-label">
            <span id="add-shot-label-0">Prompt</span>
            <button class="shot-remove" id="add-shot-remove-0" style="display:none" onclick="removeShotField(0)">✕ Remove</button>
          </div>
          <textarea id="add-shot-0" rows="6" placeholder="Paste your prompt here..."></textarea>
          <div id="add-shot-img-wrap-0" style="display:none;margin-top:8px">
            <div style="font-size:9px;letter-spacing:0.12em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:4px" id="add-shot-img-label-0">@image_1</div>
            <input type="text" id="add-shot-img-0" placeholder="Describe the reference image for this shot...">
          </div>
        </div>
      </div>
      <button class="btn" id="add-shot-btn" style="display:none;margin-top:8px;font-size:10px" onclick="addShotField()">+ Add Shot</button>
    </div>
    <div class="form-section" id="add-refimage-wrap">
      <label class="lbl">Reference image description</label>
      <input type="text" id="add-refimage" placeholder="Describe the reference image used to generate this...">
    </div>
    <div class="form-section">
      <label class="lbl">Notes <span style="color:#282828">(optional)</span></label>
      <textarea id="add-notes" rows="3" placeholder="Settings, observations, what worked..."></textarea>
    </div>
    <div class="form-section">
      <label class="lbl">Your name <span style="color:#282828">(optional)</span></label>
      <input type="text" id="add-author" placeholder="e.g. Marco, @yourhandle...">
      <div class="hint">Shown on the card if your preset gets featured on the platform.</div>
    </div>
    <div class="action-row">
      <button class="btn btn-primary" onclick="saveNewPreset()">Save Preset</button>
      <button class="btn" onclick="showView('library')">Cancel</button>
    </div>
  </div>
</div>

<div id="view-edit" class="view">
  <div class="body-narrow">
    <div class="form-section">
      <label class="lbl">Title</label>
      <input type="text" id="edit-title">
    </div>
    <div class="form-row">
      <div>
        <label class="lbl">Tool</label>
        <select id="edit-tool">
          <option>Seedance</option><option>Kling</option><option>ComfyUI</option><option>Other</option>
        </select>
      </div>
      <div>
        <label class="lbl">Shot type</label>
        <select id="edit-shot">
          <option>Wide</option><option>Close-up</option><option>POV</option>
          <option>Aerial</option><option>Tracking</option><option>Static</option>
          <option>Handheld</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-section">
      <label class="lbl">Preview GIF filename</label>
      <input type="text" id="edit-gif" oninput="previewGif('edit')">
      <div id="edit-gif-hint" class="hint"></div>
      <img id="edit-gif-preview" class="gif-preview" style="display:none" alt="GIF preview">
    </div>
    <div class="form-section">
      <label class="lbl">YouTube URL <span style="color:#282828">(optional)</span></label>
      <input type="text" id="edit-yt" oninput="validateYt('edit')">
      <div id="edit-yt-hint" class="hint"></div>
    </div>
    <div class="form-section">
      <label class="lbl">Card type</label>
      <div class="type-toggle">
        <button id="edit-type-single" class="active" onclick="setEditType('single')">Single Shot</button>
        <button id="edit-type-sequence" onclick="setEditType('sequence')">Sequence</button>
      </div>
    </div>
    <div class="form-section">
      <label class="lbl">Prompts</label>
      <div id="edit-shots-container"></div>
      <button class="btn" id="edit-shot-btn" style="display:none;margin-top:8px;font-size:10px" onclick="addEditShotField()">+ Add Shot</button>
    </div>
    <div class="form-section">
      <label class="lbl">Reference image description</label>
      <input type="text" id="edit-refimage">
    </div>
    <div class="form-section">
      <label class="lbl">Notes <span style="color:#282828">(optional)</span></label>
      <textarea id="edit-notes" rows="3"></textarea>
    </div>
    <div class="form-section">
      <label class="lbl">Author <span style="color:#282828">(optional)</span></label>
      <input type="text" id="edit-author" placeholder="e.g. Gerardo, @yourhandle...">
    </div>
    <div class="action-row">
      <button class="btn btn-primary" onclick="saveEditPreset()">Save Changes</button>
      <button class="btn" onclick="showView('detail')">Cancel</button>
    </div>
  </div>
</div>

<div id="view-detail" class="view">
  <div class="body-narrow" style="max-width:680px">
    <div id="detail-preview-wrap"></div>
    <div class="detail-meta" id="detail-meta"></div>
    <div class="detail-section" id="detail-prompts-wrap"></div>
    <div class="detail-section" id="detail-refimage-wrap"></div>

<script>
const GIF_BASE = 'https://cdn.jsdelivr.net/gh/Gerry-Malta/Prompt_Studio@main/gifs/';
const PRESETS_URL = 'https://cdn.jsdelivr.net/gh/Gerry-Malta/Prompt_Studio@main/prompt-vault-export.json';
const TOOLS_URL = 'https://cdn.jsdelivr.net/gh/Gerry-Malta/Prompt_Studio@main/tools-export.json';
const TOOLS = ['Seedance','Kling','ComfyUI','Other'];
const TOOL_COLORS = { Seedance:'#1D9E75', Kling:'#7F77DD', ComfyUI:'#378ADD', Other:'#d18d1f' };

let allPresets = [];
let currentPreset = null;
let allTools = [];
let currentTool = null;

// ── STORAGE (localStorage) ───────────────────────────────────────
function loadPresets() {
  try {
    const raw = localStorage.getItem('pv_presets');
    allPresets = raw ? JSON.parse(raw) : [];
  } catch { allPresets = []; }
}

function persistPresets() {
  localStorage.setItem('pv_presets', JSON.stringify(allPresets));
}

function loadTools() {
  try {
    const raw = localStorage.getItem('pv_tools');
    allTools = raw ? JSON.parse(raw) : [];
  } catch { allTools = []; }
}

function persistTools() {
  localStorage.setItem('pv_tools', JSON.stringify(allTools));
}

// ── API KEY ──────────────────────────────────────────────────────
function getApiKey() { return localStorage.getItem('pv_api_key') || ''; }

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  localStorage.setItem('pv_api_key', key);
  document.getElementById('api-key-status').textContent = '✓ API key saved';
  document.getElementById('api-key-status').className = 'api-status hint hint-ok';
  updateModifierAccess();
}

function clearApiKey() {
  localStorage.removeItem('pv_api_key');
  document.getElementById('api-key-input').value = '';
  document.getElementById('api-key-status').textContent = 'API key cleared';
  document.getElementById('api-key-status').className = 'api-status hint hint-err';
  updateModifierAccess();
}

function updateModifierAccess() {
  const hasKey = !!getApiKey();
  const notice = document.getElementById('modifier-api-notice');
  const body = document.getElementById('modifier-body');
  if (notice && body) {
    notice.style.display = hasKey ? 'none' : 'block';
    document.getElementById('adapt-btn').disabled = !hasKey;
    document.getElementById('adapt-btn').style.opacity = hasKey ? '1' : '0.4';
  }
}

// ── VIEWS ────────────────────────────────────────────────────────
function showView(name, subtitle) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  renderNavBtns(name);
  if (name === 'library') renderGrid();
  if (name === 'tools') renderToolsGrid();
  if (name === 'settings') {
    const key = getApiKey();
    const inp = document.getElementById('api-key-input');
    if (key) { inp.value = key; document.getElementById('api-key-status').textContent = '✓ API key saved'; document.getElementById('api-key-status').className = 'api-status hint hint-ok'; }
  }
}

function renderNavBtns(activeView) {
  const nav = document.getElementById('nav-btns');
  const isLib = activeView === 'library';
  const isTools = activeView === 'tools';
  if (isLib || isTools) {
    nav.innerHTML = `
      <button class="btn btn-nav ${isLib ? 'active' : ''}" onclick="showView('library')">Library</button>
      <button class="btn btn-nav ${isTools ? 'active' : ''}" onclick="showView('tools')">Tools</button>
      <button class="btn btn-nav btn-add" onclick="${isTools ? 'openToolAdd()' : 'openAdd()'}">+ Add</button>
      <button class="btn btn-nav" onclick="showView('settings')">Settings</button>`;
  } else if (activeView === 'add') {
    nav.innerHTML = `<button class="btn btn-nav" onclick="showView('library')">← Back</button>`;
  } else if (activeView === 'edit') {
    nav.innerHTML = `<button class="btn btn-nav" onclick="showView('detail')">← Back</button>`;
  } else if (activeView === 'detail') {
    const ytId = getYouTubeId(currentPreset?.youtubeUrl);
    nav.innerHTML = `
      ${ytId ? `<a class="btn btn-yt" href="${currentPreset.youtubeUrl}" target="_blank">▶ YouTube</a>` : ''}
      <button class="btn btn-nav" onclick="showView('library')">← Library</button>`;
  } else if (activeView === 'tool-add') {
    nav.innerHTML = `<button class="btn btn-nav" onclick="showView('tools')">← Back</button>`;
  } else if (activeView === 'tool-edit') {
    nav.innerHTML = `<button class="btn btn-nav" onclick="showView('tool-detail')">← Back</button>`;
  } else if (activeView === 'tool-detail') {
    nav.innerHTML = `<button class="btn btn-nav" onclick="showView('tools')">← Tools</button>`;
  } else if (activeView === 'settings') {
    nav.innerHTML = `<button class="btn btn-nav" onclick="showView('library')">← Library</button>`;
  }
}

// ── UTILS ────────────────────────────────────────────────────────
function getYouTubeId(url) {
  if (!url) return null;
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/watch\?.*v=([a-zA-Z0-9_-]{11})/
  ];
  for (const p of patterns) { const m = url.match(p); if (m) return m[1]; }
  return null;
}

function getGifUrl(filename) {
  if (!filename) return null;
  const f = filename.trim();
  return f.startsWith('http') ? f : GIF_BASE + f;
}

function tagHTML(tool) {
  const color = TOOL_COLORS[tool] || '#888';
  return `<span class="tag" style="color:${color};border-color:${color}44">${tool}</span>`;
}

function copyRaw(text, btnId, label) {
  navigator.clipboard.writeText(text);
  const btn = document.getElementById(btnId);
  if (!btn) return;
  const orig = btn.textContent;
  btn.textContent = label;
  setTimeout(() => btn.textContent = orig, 2000);
}

// ── GRID ─────────────────────────────────────────────────────────
function filterPresets() { renderGrid(); }

function renderGrid() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const tool = document.getElementById('tool-filter').value;
  const filtered = allPresets.filter(p => {
    const ms = p.title.toLowerCase().includes(search) || (p.prompt || '').toLowerCase().includes(search) || (p.shots ? p.shots.map(s => s.prompt || s).join(' ').toLowerCase().includes(search) : false);
    const mt = tool === 'All' || p.tool === tool;
    return ms && mt;
  });

  const grid = document.getElementById('preset-grid');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('preset-count');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    count.textContent = '';
    document.getElementById('empty-label').textContent = allPresets.length === 0 ? 'NO PRESETS YET' : 'NO RESULTS';
    document.getElementById('empty-sub').textContent = allPresets.length === 0 ? 'Hit + Add to save your first prompt' : '';
  } else {
    empty.style.display = 'none';
    count.textContent = filtered.length + ' PRESET' + (filtered.length !== 1 ? 'S' : '');
    grid.innerHTML = filtered.map(p => cardHTML(p)).join('');
    // Load counts for all visible cards
    fetchAllCounts(filtered.map(p => p.id)).then(counts => {
      filtered.forEach(p => {
        const el = document.getElementById(`card-count-${p.id}`);
        if (el && counts[p.id]) el.textContent = '↗ ' + formatCount(counts[p.id]);
      });
    });
  }
}

function cardHTML(p) {
  const gifUrl = getGifUrl(p.gifFilename);
  const ytId = getYouTubeId(p.youtubeUrl);
  let imgHTML = '';

  if (gifUrl) {
    imgHTML = `<img src="${gifUrl}" alt="" onerror="this.style.display='none'">`;
  } else if (ytId) {
    imgHTML = `<img src="https://img.youtube.com/vi/${ytId}/hqdefault.jpg" alt="" onerror="this.style.display='none'">`;
  }

  const emptyHTML = (!gifUrl && !ytId) ? `<div class="thumb-empty"><div class="thumb-empty-icon">▶</div><div class="thumb-empty-label">NO PREVIEW</div></div>` : '';
  const seqTag = p.type === 'sequence' ? `<span class="tag tag-sequence">Sequence</span>` : '';
  const date = new Date(p.createdAt).toLocaleDateString();
  const authorTag = p.author ? `<span class="tag tag-author">by ${escHtml(p.author)}</span>` : '';
  const ytBtn = ytId ? `<a class="btn btn-yt" href="${p.youtubeUrl}" target="_blank" style="padding:6px 10px" onclick="event.stopPropagation()">▶ YT</a>` : '';

  return `
    <div class="card" onclick="openDetail('${p.id}')">
      <div class="thumb">
        ${imgHTML}
        ${emptyHTML}
        <div class="card-overlay">
          <div class="card-peek">${escHtml(p.title)}</div>
          <div class="card-overlay-tags">
            ${tagHTML(p.tool)}<span class="tag tag-neutral">${p.shotType}</span>${seqTag}${authorTag}
          </div>
          <div class="card-overlay-snippet">${escHtml(p.type === 'sequence' ? (p.shots ? (p.shots[0].prompt || p.shots[0]) : '') : (p.prompt || ''))}</div>
          <div class="card-overlay-actions">
            <button class="btn btn-primary" style="flex:1;padding:6px 0;justify-content:center" onclick="openDetail('${p.id}')">Use Preset</button>
            ${ytBtn}
          </div>
          <div class="card-overlay-meta">${date} <span id="card-count-${p.id}" style="color:var(--gold-dim);margin-left:6px"></span></div>
        </div>
      </div>
    </div>`;
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ADD ──────────────────────────────────────────────────────────
let addShotCount = 1;
let addType = 'single';

function setAddType(type) {
  addType = type;
  document.getElementById('add-type-single').classList.toggle('active', type === 'single');
  document.getElementById('add-type-sequence').classList.toggle('active', type === 'sequence');
  document.getElementById('add-shot-btn').style.display = type === 'sequence' ? 'inline-flex' : 'none';
  // Toggle shared refimage vs per-shot images
  document.getElementById('add-refimage-wrap').style.display = type === 'sequence' ? 'none' : 'block';
  updateAddShotLabels();
}

function updateAddShotLabels() {
  for (let i = 0; i < addShotCount; i++) {
    const lbl = document.getElementById(`add-shot-label-${i}`);
    if (lbl) lbl.textContent = addType === 'sequence' ? `Shot ${String(i+1).padStart(2,'0')}` : 'Prompt';
    const rem = document.getElementById(`add-shot-remove-${i}`);
    if (rem) rem.style.display = addType === 'sequence' && addShotCount > 1 ? 'inline' : 'none';
    const imgWrap = document.getElementById(`add-shot-img-wrap-${i}`);
    if (imgWrap) imgWrap.style.display = addType === 'sequence' ? 'block' : 'none';
    const imgLbl = document.getElementById(`add-shot-img-label-${i}`);
    if (imgLbl) imgLbl.textContent = `@image_${i+1}`;
  }
}

function addShotField() {
  const container = document.getElementById('add-shots-container');
  const i = addShotCount;
  const div = document.createElement('div');
  div.className = 'shot-field';
  div.id = `add-shot-field-${i}`;
  div.innerHTML = `
    <div class="shot-field-label">
      <span id="add-shot-label-${i}">Shot ${String(i+1).padStart(2,'0')}</span>
      <button class="shot-remove" id="add-shot-remove-${i}" onclick="removeShotField(${i})">✕ Remove</button>
    </div>
    <textarea id="add-shot-${i}" rows="5" placeholder="Paste shot ${i+1} prompt here..."></textarea>
    <div id="add-shot-img-wrap-${i}" style="margin-top:8px">
      <div style="font-size:9px;letter-spacing:0.12em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:4px">@image_${i+1}</div>
      <input type="text" id="add-shot-img-${i}" placeholder="Describe the reference image for this shot...">
    </div>`;
  container.appendChild(div);
  addShotCount++;
  updateAddShotLabels();
}

function removeShotField(i) {
  const el = document.getElementById(`add-shot-field-${i}`);
  if (el) el.remove();
  updateAddShotLabels();
}

function openAdd() {
  document.getElementById('add-modal').style.display = 'flex';
}

function closeAddModal() {
  document.getElementById('add-modal').style.display = 'none';

function getAddShots() {
  const shots = [];
  for (let i = 0; i < addShotCount; i++) {
    const el = document.getElementById(`add-shot-${i}`);
    const imgEl = document.getElementById(`add-shot-img-${i}`);
    if (el && el.value.trim()) shots.push({
      prompt: el.value.trim(),
      refImage: imgEl ? imgEl.value.trim() : ''
    });
  }
  return shots;
}

function saveNewPreset() {
  const title = document.getElementById('add-title').value.trim();
  const shots = getAddShots();

  const isSeq = addType === 'sequence' && shots.length > 1;
  const preset = {
    id: Date.now().toString(),
    title,
    type: isSeq ? 'sequence' : 'single',
    tool: document.getElementById('add-tool').value,
    shotType: document.getElementById('add-shot').value,
    gifFilename: document.getElementById('add-gif').value.trim(),
    youtubeUrl: document.getElementById('add-yt').value.trim(),
    prompt: isSeq ? null : shots[0].prompt,

    shots: isSeq ? shots : null,
    notes: document.getElementById('add-notes').value.trim(),
    author: document.getElementById('add-author').value.trim(),

// ── COUNTER ──────────────────────────────────────────────────────
const COUNT_NS = 'district-zero-vault';

async function incrementCount(presetId) {
  try {
    const res = await fetch(`https://api.countapi.xyz/hit/${COUNT_NS}/${presetId}`);
    const data = await res.json();
    return data.value || 1;
  } catch { return null; }
}

async function fetchCount(presetId) {
  try {
    const res = await fetch(`https://api.countapi.xyz/get/${COUNT_NS}/${presetId}`);
    const data = await res.json();
    return data.value || 0;
  } catch { return null; }
}

async function fetchAllCounts(presetIds) {
  const counts = {};
  await Promise.all(presetIds.map(async id => {
    const n = await fetchCount(id);
    if (n !== null) counts[id] = n;
  }));
  return counts;
}

function formatCount(n) {
  if (n === null || n === undefined) return '';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k uses';
  return n + ' use' + (n !== 1 ? 's' : '');
}

// ── ADAPT PROMPT ─────────────────────────────────────────────────
async function adaptPrompt() {
  const changes = document.getElementById('mod-changes').value.trim();
  const refImage = document.getElementById('mod-refimage').value.trim();
  const apiKey = getApiKey();
  if (!changes || !apiKey) return;

  const isSeq = currentPreset.type === 'sequence' && currentPreset.shots && currentPreset.shots.length > 1;
  const shotIndex = isSeq ? parseInt(document.getElementById('mod-shot-index').value) : 0;
  const promptToAdapt = isSeq
    ? (currentPreset.shots[shotIndex].prompt || currentPreset.shots[shotIndex])
    : (currentPreset.prompt || currentPreset.shots?.[0]?.prompt || '');

  const btn = document.getElementById('adapt-btn');
  btn.innerHTML = '<span class="spinner"></span>Adapting...';
  btn.disabled = true;
  document.getElementById('adapted-result').style.display = 'none';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a video prompt adapter for AI video generation tools. Modify the given prompt based on the user's new reference image and requested changes.

LOCKED — never change: camera motion type, shot structure and framing logic, output format, aspect ratio, technical parameters, any specific numbers (duration, fps, resolution), overall grammatical structure.

SWAPPABLE — only change what user asks: subject/main character, environment/location/background, lighting mood and color palette, action or movement type, specific visual details tied to the subject.

Rules: Keep exact same prompt structure and length. Only swap what is explicitly requested. Output ONLY the adapted prompt text, no explanation, no preamble.`,
        messages: [{ role: 'user', content: `ORIGINAL PROMPT:\n${promptToAdapt}\n\nNEW REFERENCE IMAGE:\n${refImage || 'Not specified'}\n\nWHAT TO CHANGE:\n${changes}\n\nAdapt the prompt.` }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content?.map(b => b.text || '').join('') || 'Error generating.';
    document.getElementById('adapted-prompt-text').textContent = text;
    document.getElementById('copy-mod-btn').textContent = 'Copy';
    document.getElementById('adapted-result').style.display = 'block';
  } catch (e) {
    document.getElementById('adapted-prompt-text').textContent = 'Error: ' + e.message;
    document.getElementById('adapted-result').style.display = 'block';
  }

  btn.innerHTML = 'Adapt Prompt →';
  btn.disabled = false;
}

function previewGif(prefix) {

// ── EXPORT / IMPORT ──────────────────────────────────────────────
function exportPresets() {
  const blob = new Blob([JSON.stringify(allPresets, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'prompt-vault-export.json';
  a.click();
}

function importPresets(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Invalid format');
      const existing = new Set(allPresets.map(p => p.id));
      const newOnes = data.filter(p => !existing.has(p.id));
      allPresets = [...newOnes, ...allPresets];
      persistPresets();
      document.getElementById('import-status').textContent = `✓ Imported ${newOnes.length} new presets (${data.length - newOnes.length} duplicates skipped)`;
      document.getElementById('import-status').className = 'hint hint-ok';
    } catch(err) {
      document.getElementById('import-status').textContent = '✗ Import failed: ' + err.message;
      document.getElementById('import-status').className = 'hint hint-err';
    }
  };
  reader.readAsText(file);
}

// ── GITHUB AUTO-LOAD ─────────────────────────────────────────────
async function syncFromGitHub() {
  try {
    const res = await fetch(PRESETS_URL + '?t=' + Date.now()); // bust cache
    if (!res.ok) return; // no file yet, skip silently
    const remote = await res.json();
    if (!Array.isArray(remote)) return;
    const existing = new Set(allPresets.map(p => p.id));
    const newOnes = remote.filter(p => !existing.has(p.id));
    if (newOnes.length > 0) {
      allPresets = [...allPresets, ...newOnes];
      persistPresets();
      renderGrid();
      const banner = document.getElementById('sync-banner');
      if (banner) { banner.textContent = `↓ ${newOnes.length} new preset${newOnes.length > 1 ? 's' : ''} loaded from GitHub`; banner.style.display = 'block'; setTimeout(() => banner.style.display = 'none', 4000); }
    }
  } catch { /* network error, skip silently */ }
}

// ── TOOLS GRID ───────────────────────────────────────────────────
function filterTools() { renderToolsGrid(); }

function renderToolsGrid() {
  const search = document.getElementById('tools-search-input').value.toLowerCase();
  const filtered = allTools.filter(t =>
    t.title.toLowerCase().includes(search) || (t.description || '').toLowerCase().includes(search)
  );
  const grid = document.getElementById('tools-grid');
  const empty = document.getElementById('tools-empty-state');
  const count = document.getElementById('tools-count');
  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    count.textContent = '';
    document.getElementById('tools-empty-label').textContent = allTools.length === 0 ? 'NO TOOLS YET' : 'NO RESULTS';
    document.getElementById('tools-empty-sub').textContent = allTools.length === 0 ? 'Hit + Add to save your first tool' : '';
  } else {
    empty.style.display = 'none';
    count.textContent = filtered.length + ' TOOL' + (filtered.length !== 1 ? 'S' : '');
    grid.innerHTML = filtered.map(t => toolCardHTML(t)).join('');
  }
}

function toolCardHTML(t) {
  const gifUrl = getGifUrl(t.gifFilename);
  const imgHTML = gifUrl ? `<img src="${gifUrl}" alt="" onerror="this.style.display='none'">` : '';
  const emptyHTML = !gifUrl ? `<div class="thumb-empty"><div class="thumb-empty-icon">⚙</div><div class="thumb-empty-label">NO PREVIEW</div></div>` : '';
  const fileBadges = (t.files || []).map(f => `<span class="file-badge">.${f.name.split('.').pop()}</span>`).join('');
  const authorTag = t.author ? `<span class="tag tag-author">by ${escHtml(t.author)}</span>` : '';
  const date = new Date(t.createdAt).toLocaleDateString();
  return `
    <div class="card" onclick="openToolDetail('${t.id}')">
      <div class="thumb">
        ${imgHTML}${emptyHTML}
        <div class="card-overlay">
          <div class="card-peek">${escHtml(t.title)}</div>
          <div class="card-overlay-tags">
            <span class="tag tag-tool-card">Tool</span>${authorTag}
          </div>
          <div class="card-overlay-snippet">${escHtml(t.description || '')}</div>
          <div class="card-overlay-actions">
            <button class="btn btn-primary" style="flex:1;padding:6px 0;justify-content:center" onclick="openToolDetail('${t.id}')">View Tool</button>
          </div>
          <div class="card-overlay-meta">${fileBadges} <span style="margin-left:4px">${date}</span></div>
        </div>
      </div>
    </div>`;
}

  const files = [];
  container.querySelectorAll('.file-field').forEach((field, i) => {
    const nameEl = field.querySelector(`[id^="${prefix}-fname"]`);
    const contentEl = field.querySelector(`[id^="${prefix}-fcontent"]`);
    if (nameEl && contentEl && nameEl.value.trim()) {
      files.push({ name: nameEl.value.trim(), content: contentEl.value });
    }
  });
  return files;
}

function saveNewTool() {
  const title = document.getElementById('tadd-title').value.trim();
  if (!title) { alert('Title is required.'); return; }
  const files = getToolFiles('tadd', document.getElementById('tadd-files-container'));
  const tool = {
    id: Date.now().toString(),
    title,
    description: document.getElementById('tadd-desc').value.trim(),
    howTo: document.getElementById('tadd-howto').value.trim(),
    gifFilename: document.getElementById('tadd-gif').value.trim(),
    author: document.getElementById('tadd-author').value.trim(),
    files,
    createdAt: new Date().toISOString()
  };
  allTools.unshift(tool);
  persistTools();
  showView('tools');
}

// ── TOOL EDIT ────────────────────────────────────────────────────
function openToolEdit() {
  const t = currentTool;
  document.getElementById('tedit-title').value = t.title || '';
  document.getElementById('tedit-desc').value = t.description || '';
  document.getElementById('tedit-howto').value = t.howTo || '';
  document.getElementById('tedit-gif').value = t.gifFilename || '';
  document.getElementById('tedit-author').value = t.author || '';
  document.getElementById('tedit-gif-hint').textContent = '';
  const prev = document.getElementById('tedit-gif-preview');
  if (t.gifFilename) { prev.src = getGifUrl(t.gifFilename); prev.style.display = 'block'; } else { prev.style.display = 'none'; }
  // Build file fields
  const container = document.getElementById('tedit-files-container');
  container.innerHTML = '';
  (t.files || []).forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'file-field';
    div.innerHTML = `
      <div class="file-field-header">
        <span>File ${String(i+1).padStart(2,'0')}</span>
        <button class="shot-remove" onclick="this.closest('.file-field').remove()">✕ Remove</button>
      </div>
      <div style="margin-bottom:6px">
        <label class="lbl" style="margin-bottom:4px">Filename</label>
        <input type="text" class="tedit-fname" value="${escHtml(f.name)}">
      </div>
      <div>
        <label class="lbl" style="margin-bottom:4px">Content</label>
        <textarea class="tedit-fcontent" rows="6">${escHtml(f.content)}</textarea>
      </div>`;
    container.appendChild(div);
  });
  showView('tool-edit');
}

function addToolEditFileField() {
  const container = document.getElementById('tedit-files-container');
  const i = container.children.length;
  const div = document.createElement('div');
  div.className = 'file-field';
  div.innerHTML = `
    <div class="file-field-header">
      <span>File ${String(i+1).padStart(2,'0')}</span>
      <button class="shot-remove" onclick="this.closest('.file-field').remove()">✕ Remove</button>
    </div>
    <div style="margin-bottom:6px">
      <label class="lbl" style="margin-bottom:4px">Filename</label>
      <input type="text" class="tedit-fname" placeholder="e.g. workflow.json">
    </div>
    <div>
      <label class="lbl" style="margin-bottom:4px">Content</label>
      <textarea class="tedit-fcontent" rows="6" placeholder="Paste file content here..."></textarea>
    </div>`;
  container.appendChild(div);
}

function saveEditTool() {
  const title = document.getElementById('tedit-title').value.trim();
  if (!title) { alert('Title is required.'); return; }
  const container = document.getElementById('tedit-files-container');
  const files = [];
  container.querySelectorAll('.file-field').forEach(field => {
    const nameEl = field.querySelector('.tedit-fname');
    const contentEl = field.querySelector('.tedit-fcontent');
    if (nameEl && contentEl && nameEl.value.trim()) {
      files.push({ name: nameEl.value.trim(), content: contentEl.value });
    }
  });
  const updated = { ...currentTool, title, description: document.getElementById('tedit-desc').value.trim(), howTo: document.getElementById('tedit-howto').value.trim(), gifFilename: document.getElementById('tedit-gif').value.trim(), author: document.getElementById('tedit-author').value.trim(), files };
  allTools = allTools.map(t => t.id === updated.id ? updated : t);
  persistTools();
  currentTool = updated;
  openToolDetail(updated.id);
}

// ── TOOL DETAIL ──────────────────────────────────────────────────
function openToolDetail(id) {
  const t = allTools.find(x => x.id === id);
  if (!t) return;
  currentTool = t;

  const gifUrl = getGifUrl(t.gifFilename);
  const prevWrap = document.getElementById('tool-detail-preview-wrap');
  if (gifUrl) {
    prevWrap.innerHTML = `<div class="detail-preview"><img src="${gifUrl}" alt="" onerror="this.style.display='none'"></div>`;
  } else { prevWrap.innerHTML = ''; }

  document.getElementById('tool-detail-meta').innerHTML = `
    <span class="tag tag-tool-card">Tool</span>
    ${t.author ? `<span class="tag tag-author">by ${escHtml(t.author)}</span>` : ''}
    <span class="detail-date">${new Date(t.createdAt).toLocaleDateString()}</span>`;

  const descWrap = document.getElementById('tool-detail-desc-wrap');
  descWrap.innerHTML = t.description ? `<label class="lbl">Description</label><div class="how-to-box">${escHtml(t.description)}</div>` : '';

  const howtoWrap = document.getElementById('tool-detail-howto-wrap');
  howtoWrap.innerHTML = t.howTo ? `<label class="lbl">How to use</label><div class="how-to-box">${escHtml(t.howTo)}</div>` : '';

  const filesWrap = document.getElementById('tool-detail-files-wrap');
  if (t.files && t.files.length > 0) {
    filesWrap.innerHTML = `<label class="lbl">${t.files.length} File${t.files.length > 1 ? 's' : ''}</label>` +
      t.files.map((f, i) => `
        <div class="file-block">
          <div class="file-block-header">
            <span class="file-block-name">${escHtml(f.name)}</span>
            <button class="btn" style="padding:3px 10px;font-size:9px" onclick="downloadFile('${escHtml(f.name)}',${JSON.stringify(f.content).replace(/'/g,"\\'")},'dl-btn-${i}')"><span id="dl-btn-${i}">↓ Download</span></button>
          </div>
          <div class="file-block-body">${escHtml(f.content.substring(0, 800))}${f.content.length > 800 ? '\n...' : ''}</div>
        </div>`).join('');
  } else { filesWrap.innerHTML = ''; }

  document.getElementById('tool-delete-btn').style.display = 'inline-flex';
  document.getElementById('tool-delete-confirm').style.display = 'none';
  showView('tool-detail');
}

function downloadFile(filename, content, btnId) {
  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  const btn = document.getElementById(btnId);
  if (btn) { const orig = btn.textContent; btn.textContent = '✓ Saved'; setTimeout(() => btn.textContent = orig, 2000); }
}

function confirmToolDelete() {
  document.getElementById('tool-delete-btn').style.display = 'none';
  document.getElementById('tool-delete-confirm').style.display = 'inline-flex';
}
function cancelToolDelete() {
  document.getElementById('tool-delete-btn').style.display = 'inline-flex';
  document.getElementById('tool-delete-confirm').style.display = 'none';
}
function doToolDelete() {
  allTools = allTools.filter(t => t.id !== currentTool.id);
  persistTools();
  currentTool = null;
  showView('tools');
}

// ── TOOLS GITHUB SYNC ────────────────────────────────────────────
async function syncToolsFromGitHub() {
  try {
    const res = await fetch(TOOLS_URL + '?t=' + Date.now());
    if (!res.ok) return;
    const remote = await res.json();
    if (!Array.isArray(remote)) return;
    const existing = new Set(allTools.map(t => t.id));
    const newOnes = remote.filter(t => !existing.has(t.id));
    if (newOnes.length > 0) {
      allTools = [...allTools, ...newOnes];
      persistTools();
      renderToolsGrid();
      const banner = document.getElementById('tools-sync-banner');
      if (banner) { banner.textContent = `↓ ${newOnes.length} new tool${newOnes.length > 1 ? 's' : ''} loaded from GitHub`; banner.style.display = 'block'; setTimeout(() => banner.style.display = 'none', 4000); }
    }
  } catch {}
}

// ── TOOLS EXPORT ─────────────────────────────────────────────────
function exportTools() {
  const blob = new Blob([JSON.stringify(allTools, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tools-export.json';
  a.click();
}

function importTools(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Invalid format');
      const existing = new Set(allTools.map(t => t.id));
      const newOnes = data.filter(t => !existing.has(t.id));
      allTools = [...newOnes, ...allTools];
      persistTools();
      document.getElementById('import-status').textContent = `✓ Imported ${newOnes.length} new tools`;
      document.getElementById('import-status').className = 'hint hint-ok';
    } catch(err) {
      document.getElementById('import-status').textContent = '✗ Import failed: ' + err.message;
      document.getElementById('import-status').className = 'hint hint-err';
    }
  };
  reader.readAsText(file);
}

// ── INIT ─────────────────────────────────────────────────────────
loadPresets();
loadTools();
showView('library');
syncFromGitHub();
syncToolsFromGitHub();
</script>
